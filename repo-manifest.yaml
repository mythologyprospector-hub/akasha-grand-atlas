repo:
  name: akasha-grand-atlas
  ecosystem: akasha
  version: 0.1.0
  status: active

engine:
  family: source
  class: source_engine
  role: external_resource_mapping

identity:
  role: engine
  layer: integration
  description: >
    Source mapping engine for the Akasha constellation.
    Responsible for identifying, naming, and organizing outside information sources,
    providers, endpoints, and reference domains that Akasha may draw from.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - source_lists
    - provider_metadata
    - external_reference_maps
  produces:
    - source_catalogs
    - provider_maps
    - external_resource_indexes

capabilities:
  - source_cataloging
  - provider_mapping
  - external_resource_indexing
  - reference_structure_generation

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on: []
